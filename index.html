<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Whoa VR Zone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-18px) rotate(3deg); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.03); }
  }
  @keyframes rainbow {
    0% { color: #ff4d6d; }
    20% { color: #ff9f1c; }
    40% { color: #ffd60a; }
    60% { color: #2ec4b6; }
    80% { color: #7b2ff7; }
    100% { color: #ff4d6d; }
  }
  @keyframes drift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Comic Neue', 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', sans-serif;
    background: linear-gradient(120deg, #ff9de2, #a0e7e5, #fff3b0, #d9b8ff);
    background-size: 400% 400%;
    animation: drift 12s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
    text-align: center;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    font-size: 2rem;
    opacity: 0.6;
    z-index: 0;
  }
  .stars span {
    position: absolute;
    animation: float 4s ease-in-out infinite;
  }

  h1 {
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    animation: rainbow 6s linear infinite, wiggle 2.5s ease-in-out infinite;
    text-shadow: 3px 3px 0 rgba(255,255,255,0.6);
    margin: 0 0 6px 0;
    z-index: 1;
  }

  .subtitle {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #4b2e83;
    background: white;
    display: inline-block;
    padding: 8px 20px;
    border-radius: 30px;
    border: 4px dashed #7b2ff7;
    margin-bottom: 40px;
    z-index: 1;
    transform: rotate(-2deg);
  }

  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    z-index: 1;
    max-width: 900px;
  }

  a.card {
    text-decoration: none;
    color: #2b2b2b;
    background: #fffdf5;
    border: 5px solid #2b2b2b;
    border-radius: 24px;
    padding: 30px 26px;
    width: 260px;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    animation: wiggle 3.5s ease-in-out infinite;
  }
  a.card:nth-child(2) { animation-delay: 0.6s; }

  a.card:hover {
    transform: translate(-4px, -8px) scale(1.04);
    box-shadow: 14px 14px 0 rgba(0,0,0,0.85);
  }
  a.card:active {
    transform: translate(2px, 2px) scale(0.98);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.85);
  }

  .emoji {
    font-size: 3.2rem;
    animation: float 3s ease-in-out infinite;
  }

  .card h2 {
    margin: 0;
    font-size: 1.5rem;
  }

  .card p {
    margin: 0;
    font-size: 0.95rem;
    color: #6a6a6a;
  }

  .go {
    margin-top: 6px;
    background: #ff4d6d;
    color: white;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 1rem;
    border: 3px solid #2b2b2b;
  }

  footer {
    margin-top: 50px;
    font-size: 0.9rem;
    color: #4b2e83;
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="stars">
    <span style="top:8%; left:12%; animation-duration:5s;">✨</span>
    <span style="top:15%; left:80%; animation-duration:4s;">🚀</span>
    <span style="top:70%; left:6%; animation-duration:6s;">🌈</span>
    <span style="top:75%; left:88%; animation-duration:4.5s;">💫</span>
    <span style="top:5%; left:50%; animation-duration:5.5s;">👾</span>
  </div>

  <h1>WELCOME TO THE VR ZONE!!</h1>
  <div class="subtitle">click a portal to jump in 🎮</div>

  <div class="card-grid">
    <a class="card" href="https://mhellar.github.io/aframestuff/29/">
      <div class="emoji">🪐</div>
      <h2>Space Town VR</h2>
      <p>Float around a tiny cosmic town. Teleport with your joystick!</p>
      <span class="go">BLAST OFF →</span>
    </a>

    <a class="card" href="https://mhellar.github.io/aframestuff/29/">
      <div class="emoji">🔮</div>
      <h2>Chakra Tingle VR!</h2>
      <p>Good vibes, glowing colors, and a lot of tingles. No teleporting here, just vibes.</p>
      <span class="go">FEEL IT →</span>
    </a>
  </div>


</body>
</html>
